<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INSTATION">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<title>INSTATION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --surface2:#18181f;
  --border:rgba(255,255,255,0.07);
  --border-bright:rgba(255,180,60,0.35);
  --gold:#f5b740;
  --gold2:#e8960a;
  --accent:var(--gold);
  --text:#e8e0d0;
  --text-muted:#7a7268;
  --text-dim:#4a4642;
  --red:#e84545;
  --mono:'Space Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --tabbar-h:60px;
}

html,body{height:100%}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  overflow-x:hidden;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:pan-y;
}

/* CRT 스캔라인 */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:9998;
}

/* =============================================
   IMMERSIVE BG (데스크탑 전체)
   ============================================= */
.bg-art-layer{
  position:fixed;inset:0;z-index:-3;
  background-size:cover;background-position:center;
  filter:blur(10px) brightness(0.35) saturate(1.6);
  transform:scale(1.15);
  opacity:0;transition:opacity 1.2s ease;
  will-change:opacity;pointer-events:none;
}
.bg-art-layer.active{opacity:1}
.bg-vignette{
  position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.7) 100%),
    linear-gradient(to bottom,rgba(0,0,0,0.4) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.6) 100%);
  pointer-events:none;
}
@media(max-width:640px){.bg-art-layer,.bg-vignette{display:none}}

/* =============================================
   데스크탑 레이아웃
   ============================================= */
#desktopView{
  padding:0 0 180px 0;
}

/* HEADER */
.header{
  padding:28px 20px 20px;
  display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:1px solid var(--border);
  max-width:1200px;margin:0 auto;
  position:relative;z-index:10;
}
.logo-wordmark{
  font-family:var(--mono);font-size:26px;font-weight:700;
  letter-spacing:0.15em;color:var(--accent);line-height:1;
  text-shadow:0 0 30px rgba(245,183,64,0.4);
}
.logo-sub{
  font-family:var(--mono);font-size:9px;letter-spacing:0.28em;
  color:var(--text-muted);margin-top:5px;
}
.header-right{display:flex;align-items:center;gap:10px}
.signal-bars{display:flex;align-items:flex-end;gap:3px;height:20px}
.signal-bars span{
  width:4px;background:var(--accent);border-radius:1px;opacity:0.2;transition:opacity 0.3s;
}
.signal-bars span:nth-child(1){height:7px}
.signal-bars span:nth-child(2){height:12px}
.signal-bars span:nth-child(3){height:16px}
.signal-bars span:nth-child(4){height:20px}
.signal-bars.active span{animation:pulse-bar 1.4s ease-in-out infinite}
.signal-bars.active span:nth-child(1){animation-delay:0s}
.signal-bars.active span:nth-child(2){animation-delay:0.15s}
.signal-bars.active span:nth-child(3){animation-delay:0.3s}
.signal-bars.active span:nth-child(4){animation-delay:0.45s}
@keyframes pulse-bar{0%,100%{opacity:0.15}50%{opacity:1}}
.on-air{
  font-family:var(--mono);font-size:9px;letter-spacing:0.2em;
  padding:5px 9px;border:1px solid var(--red);color:var(--red);
  border-radius:3px;opacity:0;transition:opacity 0.3s;
}
.on-air.active{opacity:1;animation:blink-on-air 1.5s ease-in-out infinite}
@keyframes blink-on-air{0%,100%{opacity:1}50%{opacity:0.3}}

/* TICKER */
.ticker-wrap{
  overflow:hidden;background:rgba(17,17,24,0.6);
  border-bottom:1px solid var(--border);padding:7px 0;
  position:relative;z-index:10;backdrop-filter:blur(8px);
}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 45s linear infinite}
.ticker-item{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.1em;padding:0 36px}
.ticker-item::before{content:'◆  ';color:var(--accent)}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* FILTER */
.filter-wrap{
  max-width:1200px;margin:0 auto;padding:16px 20px 0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:relative;z-index:10;
}
.filter-wrap::-webkit-scrollbar{display:none}
.filter-section{display:flex;gap:7px;flex-wrap:nowrap;width:max-content}
.filter-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:0.12em;
  padding:0 14px;min-height:36px;display:flex;align-items:center;
  background:rgba(17,17,24,0.5);border:1px solid var(--border);color:var(--text-muted);
  border-radius:2px;cursor:pointer;transition:all 0.2s;white-space:nowrap;
  backdrop-filter:blur(8px);
}
@media(hover:hover){.filter-btn:hover{border-color:var(--accent);color:var(--accent)}}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* GRID */
.grid-section{max-width:1200px;margin:20px auto 0;padding:0 20px;position:relative;z-index:10}
.section-label{
  font-family:var(--mono);font-size:9px;letter-spacing:0.3em;
  color:var(--text-dim);text-transform:uppercase;margin-bottom:14px;padding-left:2px;
}
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:2px}

/* CARD */
.ch-card{
  position:relative;background:rgba(17,17,24,0.7);
  border:1px solid var(--border);cursor:pointer;
  overflow:hidden;aspect-ratio:1/1.1;
  display:flex;flex-direction:column;
  transition:border-color 0.3s,box-shadow 0.3s,transform 0.2s;
}
.ch-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.92) 100%);z-index:1;
}
.ch-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  z-index:2;pointer-events:none;
}
@media(hover:hover){
  .ch-card:hover{border-color:var(--border-bright);box-shadow:0 0 20px rgba(245,183,64,0.1);z-index:2;transform:scale(1.02)}
  .ch-card:hover .ch-thumb{transform:scale(1.07)}
}
@media(hover:none){.ch-card:active{border-color:var(--border-bright);opacity:0.82}}
.ch-card.active{border-color:var(--accent);box-shadow:0 0 24px rgba(245,183,64,0.2)}
.ch-top-line{display:none}
.ch-card.active .ch-top-line{
  display:block;position:absolute;top:0;left:0;right:0;
  height:2px;background:var(--accent);z-index:10;
}
.ch-num{position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:0.1em;z-index:3;opacity:0.6}
.ch-thumb{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease;position:absolute;inset:0}
.ch-thumb-placeholder{position:absolute;inset:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px}
.ch-info{position:absolute;bottom:0;left:0;right:0;padding:10px;z-index:3}
.ch-tag{font-family:var(--mono);font-size:8px;letter-spacing:0.18em;color:var(--accent);text-transform:uppercase;margin-bottom:3px;opacity:0.85}
.ch-name{font-size:12px;font-weight:500;color:#fff;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.9)}
.ch-playing-badge{position:absolute;top:8px;right:8px;z-index:5;display:none}
.ch-card.active .ch-playing-badge{display:flex}
.ch-playing-badge svg{width:16px;height:16px}
.eq-bar{animation:eq-anim 0.6s ease-in-out infinite alternate;transform-origin:bottom}
.eq-bar:nth-child(2){animation-delay:0.15s}
.eq-bar:nth-child(3){animation-delay:0.3s}
@keyframes eq-anim{from{transform:scaleY(0.3)}to{transform:scaleY(1)}}
.ch-card.hidden-card{display:none}

/* =============================================
   데스크탑 플레이어 바
   ============================================= */
.desktop-player{
  position:fixed;bottom:0;left:0;right:0;
  display:none;z-index:1000;overflow:hidden;
  padding-bottom:var(--safe-b);
  background:rgba(6,6,10,0.92);
  border-top:1px solid rgba(255,180,60,0.2);
}
.desktop-player.visible{display:block}
.desktop-player::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.6;z-index:5;
}
.dp-bg-a,.dp-bg-b{
  position:absolute;inset:-30px;
  background-size:cover;background-position:center;
  filter:blur(10px) brightness(0.58) saturate(1.5);
  opacity:0;transition:opacity 1s ease;z-index:0;pointer-events:none;
}
.dp-bg-a.active,.dp-bg-b.active{opacity:1}
.dp-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to right,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.1) 50%,rgba(0,0,0,0.3) 100%);
  pointer-events:none;
}
.dp-inner{
  max-width:1200px;margin:0 auto;padding:12px 20px;
  display:flex;flex-direction:row;align-items:center;gap:16px;
  position:relative;z-index:2;
}
.dp-album{
  width:120px;height:120px;border-radius:6px;flex-shrink:0;overflow:hidden;
  background:var(--surface2);border:1px solid rgba(255,180,60,0.25);
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:box-shadow 0.8s,border-color 0.8s;
}
.dp-album img{width:100%;height:100%;object-fit:cover;display:block}
.dp-album .album-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}
.dp-album.has-art{box-shadow:0 4px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(255,180,60,0.3)}
.dp-track{flex:1;min-width:0;overflow:hidden}
.dp-tag{
  font-family:var(--mono);font-size:11px;letter-spacing:0.2em;
  color:var(--accent);margin-bottom:4px;opacity:0.9;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dp-controls{display:flex;align-items:center;gap:14px;flex-shrink:0}
.dp-freq{
  font-family:var(--mono);font-size:18px;font-weight:700;
  color:var(--accent);letter-spacing:0.05em;
  flex-shrink:0;min-width:82px;text-align:right;
  text-shadow:0 0 20px rgba(245,183,64,0.5);
}
.play-btn{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--accent);background:transparent;color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:background 0.15s,color 0.15s,box-shadow 0.8s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:0 0 16px rgba(245,183,64,0.2);
}
@media(hover:hover){.play-btn:hover{background:var(--accent);color:#000}}
.play-btn:active{background:var(--accent);color:#000}
.play-btn svg{width:20px;height:20px}
.vol-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;min-width:110px}
.vol-icon{
  background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  transition:color 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
@media(hover:hover){.vol-icon:hover{color:var(--accent)}}
.vol-icon:active{color:var(--accent)}
.vol-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:rgba(255,255,255,0.1);border-radius:2px;
  outline:none;border:none;cursor:pointer;min-width:60px;
}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.vol-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}

/* 마퀴 */
.np-marquee{
  overflow:hidden;position:relative;
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 4%,black 92%,transparent 100%);
  mask-image:linear-gradient(to right,transparent 0%,black 4%,black 92%,transparent 100%);
}
.np-marquee.short{-webkit-mask-image:none;mask-image:none}
.np-marquee-inner{display:inline-block;white-space:nowrap}
.np-marquee.scrolling .np-marquee-inner{animation:marquee-scroll var(--marquee-dur,12s) linear infinite}
@keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(var(--marquee-dist,-50%))}}
.dp-title {
  font-size: 32px; font-weight: 600; color: var(--text); line-height: 1.35;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
}
.dp-artist {
  font-size: 20px; color: var(--text);
  white-space: nowrap;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
}
/* 모바일 풀스크린 타이틀 & 아티스트 */
.mp-title {
  font-size: 32px; font-weight: 700; color: var(--text); line-height: 1.2;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9), 0 0 15px rgba(0, 0, 0, 0.6);
}
.np-loading{font-family:var(--mono);font-size:9px;color:var(--text-dim);animation:np-blink 1.2s ease-in-out infinite}
@keyframes np-blink{0%,100%{opacity:1}50%{opacity:0.3}}
.np-spin{display:inline-block;animation:np-rotate 1s linear infinite}
@keyframes np-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

audio{display:none}

/* =============================================
   모바일 전용 구조
   ============================================= */
#mobileView{display:none}

/* 채널 뷰 (모바일) */
#mobileChannels{
  position:fixed;inset:0;
  background:var(--bg);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tabbar-h) + var(--safe-b));
  z-index:100;
}
.mob-header{
  padding:calc(var(--safe-t) + 16px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  z-index:10;
}
.mob-logo{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:0.15em;color:var(--accent)}
.mob-on-air{font-family:var(--mono);font-size:8px;letter-spacing:0.15em;padding:4px 8px;border:1px solid var(--red);color:var(--red);border-radius:3px;opacity:0;transition:opacity 0.3s}
.mob-on-air.active{opacity:1;animation:blink-on-air 1.5s ease-in-out infinite}

.mob-ticker-wrap{overflow:hidden;background:rgba(17,17,24,0.8);border-bottom:1px solid var(--border);padding:6px 0}
.mob-ticker-inner{display:flex;white-space:nowrap;animation:ticker 45s linear infinite}

.mob-filter-wrap{
  padding:12px 16px 0;overflow-x:auto;scrollbar-width:none;
}
.mob-filter-wrap::-webkit-scrollbar{display:none}
.mob-filter-section{display:flex;gap:7px;flex-wrap:nowrap;width:max-content}

.mob-grid-section{padding:14px 16px}
.mob-section-label{font-family:var(--mono);font-size:8px;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;padding-left:2px}
.mob-channel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}

/* 플레이어 뷰 (모바일 풀스크린) */
#mobilePlayer{
  position:fixed;inset:0;
  background:var(--bg);
  overflow:hidden;
  z-index:100;
  display:none;
  flex-direction:column;
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
#mobilePlayer.active{display:flex}

/* 플레이어 배경 블러 */
.mp-bg-a,.mp-bg-b{
  position:absolute;inset:-40px;
  background-size:cover;background-position:center;
  filter:blur(10px) brightness(0.58) saturate(1.8);
  opacity:0;transition:opacity 1.2s ease;z-index:0;pointer-events:none;
}
.mp-bg-a.active,.mp-bg-b.active{opacity:1}
.mp-vignette{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 30%,transparent 40%,rgba(0,0,0,0.5) 100%),
    linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,transparent 20%,transparent 75%,rgba(0,0,0,0.8) 100%);
}

.mp-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  height:100%;
  padding-top:var(--safe-t);
  padding-bottom:calc(var(--tabbar-h) + var(--safe-b));
}

/* 플레이어 헤더 */
.mp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;
}
.mp-logo{font-family:var(--mono);font-size:14px;letter-spacing:0.2em;color:var(--accent)}
.mp-on-air{font-family:var(--mono);font-size:8px;letter-spacing:0.15em;padding:4px 8px;border:1px solid var(--red);color:var(--red);border-radius:3px;opacity:0;transition:opacity 0.3s}
.mp-on-air.active{opacity:1;animation:blink-on-air 1.5s ease-in-out infinite}

/* 앨범아트 */
.mp-album-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:10px 30px;min-height:0;
}
.mp-album{
  width:100%;max-width:320px;aspect-ratio:1/1;
  border-radius:12px;overflow:hidden;
  background:var(--surface2);
  box-shadow:0 24px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(255,180,60,0.15);
  display:flex;align-items:center;justify-content:center;font-size:60px;
  transition:box-shadow 0.8s;
}
.mp-album img{width:100%;height:100%;object-fit:cover;display:block}
.mp-album .album-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px}
.mp-album.has-art{box-shadow:0 24px 60px rgba(0,0,0,0.7),0 0 40px rgba(245,183,64,0.15),0 0 0 1px rgba(255,180,60,0.3)}

/* 트랙 정보 */
.mp-track{padding:0 28px 16px}
.mp-tag{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--accent);opacity:0.9;margin-bottom:8px;text-transform:uppercase}
.mp-title-marquee{overflow:hidden;-webkit-mask-image:linear-gradient(to right,transparent 0%,black 3%,black 94%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,black 3%,black 94%,transparent 100%)}
.mp-title-marquee.short{-webkit-mask-image:none;mask-image:none}
.mp-title-inner{display:inline-block;white-space:nowrap}
.mp-title-marquee.scrolling .mp-title-inner{animation:marquee-scroll var(--marquee-dur,12s) linear infinite}
.mp-title{font-size:32px;font-weight:700;color:var(--text);line-height:1.2}
.mp-artist-marquee{overflow:hidden;margin-top:4px;-webkit-mask-image:linear-gradient(to right,transparent 0%,black 3%,black 94%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,black 3%,black 94%,transparent 100%)}
.mp-artist-marquee.short{-webkit-mask-image:none;mask-image:none}
.mp-artist-inner{display:inline-block;white-space:nowrap}
.mp-artist-marquee.scrolling .mp-artist-inner{animation:marquee-scroll var(--marquee-dur,12s) linear infinite}
.mp-artist{font-size:22px;color:var(--text);margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}

/* 주파수 */
.mp-freq{
  font-family:var(--mono);font-size:12px;color:var(--accent);
  opacity:0.7;letter-spacing:0.1em;
  padding:0 28px 8px;
}

/* 컨트롤 */
.mp-controls{
  display:flex;align-items:center;justify-content:center;gap:32px;
  padding:0 28px 20px;
}
.mp-play-btn{
  width:72px;height:72px;border-radius:50%;
  border:2px solid var(--accent);background:rgba(245,183,64,0.1);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background 0.15s,transform 0.1s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:0 0 30px rgba(245,183,64,0.25);
}
.mp-play-btn:active{background:var(--accent);color:#000;transform:scale(0.95)}
.mp-play-btn svg{width:28px;height:28px}

/* 모바일 플레이어 이전/다음 버튼 스타일 */
.mp-side-btn {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid rgba(255, 180, 60, 0.3); background: rgba(255, 255, 255, 0.05); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.mp-side-btn:active { background: rgba(245, 183, 64, 0.2); transform: scale(0.92); }
.mp-side-btn svg { width: 20px; height: 20px; }

/* 볼륨 */
.mp-vol{
  display:flex;align-items:center;gap:10px;
  padding:0 28px 12px;
}
.mp-vol-icon{
  background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;
  min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;
}
.mp-vol-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:rgba(255,255,255,0.15);border-radius:2px;
  outline:none;border:none;cursor:pointer;
}
.mp-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.mp-vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}

/* =============================================
   모바일 탭바
   ============================================= */
.mobile-tabbar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tabbar-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(8,8,14,0.95);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:200;
}
.mobile-tabbar::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.3;
}
.tabbar-inner{
  display:flex;height:var(--tabbar-h);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;cursor:pointer;
  color:var(--text-dim);transition:color 0.2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tab-label{font-family:var(--mono);font-size:9px;letter-spacing:0.1em}
/* 플레이어탭 활성 표시 */
.tab-btn.active::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:2px;background:var(--accent);border-radius:0 0 2px 2px;
}
/* 재생중 dot */
.tab-playing-dot{
  width:5px;height:5px;border-radius:50%;background:var(--accent);
  position:absolute;top:10px;right:calc(50% - 20px);
  display:none;
  animation:dot-pulse 1.5s ease-in-out infinite;
}
.tab-playing-dot.visible{display:block}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}

/* =============================================
   미디어쿼리 — 모바일/데스크탑 분기
   ============================================= */
@media(max-width:640px){
  body{overflow:hidden;height:100vh}
  #desktopView{display:none}
  .desktop-player{display:none!important}
  .bg-art-layer,.bg-vignette{display:none}
  #mobileView{display:block}
  .mobile-tabbar{display:block}
}
@media(min-width:641px){
  #mobileView,.mobile-tabbar{display:none!important}
  #mobilePlayer{display:none!important}
  #desktopView{display:block}
}
@media(min-width:641px) and (max-width:900px){
  .dp-freq{font-size:16px;min-width:70px}
  .vol-wrap{min-width:100px}
}
@media all and (display-mode:standalone){
  .install-banner{display:none}
  body{padding-top:env(safe-area-inset-top)}
}
</style>
</head>
<body>

<!-- Immersive BG (데스크탑) -->
<div class="bg-art-layer" id="bgArtA"></div>
<div class="bg-art-layer" id="bgArtB"></div>
<div class="bg-vignette"></div>

<!-- =============================================

     모바일 뷰

      <div class="mob-channel-grid" id="mobChannelGrid"></div>

  </div>

  <!-- 플레이어 뷰 (풀스크린) -->
  <div id="mobilePlayer">
    <div class="mp-bg-a" id="mpBgA"></div>
    <div class="mp-bg-b" id="mpBgB"></div>
    <div class="mp-vignette"></div>
    <div class="mp-content">
      <div class="mp-header">
        <div class="mp-logo">INSTATION</div>
        <div class="mp-on-air" id="mpOnAir">ON AIR</div>
      </div>
      <div class="mp-album-wrap">
        <div class="mp-album" id="mpAlbum"><div class="album-placeholder">🎵</div></div>
      </div>
      <div class="mp-track">
        <div class="mp-tag" id="mpTag">INSTATION</div>
        <div class="mp-title-marquee" id="mpTitleMarquee">
          <div class="mp-title-inner" id="mpTitleInner">
            <span class="mp-title" id="mpTitle">채널을 선택하세요</span>
          </div>
        </div>
        <div class="mp-artist-marquee" id="mpArtistMarquee">
          <div class="mp-artist-inner" id="mpArtistInner">
            <span class="mp-artist" id="mpArtist"></span>
          </div>
        </div>
      </div>
      <div class="mp-freq" id="mpFreq"></div>
      <div class="mp-controls">
        <button class="mp-side-btn" onclick="playPrevChannel()" aria-label="이전 채널">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4 19,20 M5,4 5,20 8,20 8,4"/></svg>
        </button>
        
        <button class="mp-play-btn" id="mpPlayBtn" onclick="togglePlay()" aria-label="재생/일시정지">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        
        <button class="mp-side-btn" onclick="playNextChannel()" aria-label="다음 채널">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20 5,4 M16,4 16,20 19,20 19,4"/></svg>
        </button>

        <input type="range" min="0" max="1" step="0.01" value="1" class="mp-vol-slider" id="mpVolSlider" oninput="setVolume(this.value)">
      </div>

</div><!-- /mobileView -->

<!-- 모바일 탭바 -->
<div class="mobile-tabbar" id="mobileTabbar">
  <div class="tabbar-inner">
    <!-- 채널 탭 -->
    <button class="tab-btn active" id="tabChannels" onclick="switchTab('channels')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="tab-label">CHANNELS</span>
    </button>
    <!-- 플레이어 탭 -->
    <button class="tab-btn" id="tabPlayer" onclick="switchTab('player')">
      <div class="tab-playing-dot" id="tabPlayingDot"></div>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polygon points="10,8 17,12 10,16" fill="currentColor" stroke="none"/></svg>
      <span class="tab-label">PLAYER</span>
    </button>

</div>

<audio id="audioEl"></audio>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('dragstart',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());

const channels=[
  {id:1,   img:'ori_img1',   name:'인기가요 TOP 100',       tag:'가요',    cat:'가요'},
  {id:2,   img:'ori_img2',   name:'빌보드 POP 100',         tag:'POP',     cat:'POP'},
  {id:3,   img:'ori_img3',   name:'하루종일 신나는 음악',   tag:'음악방송',cat:'음악방송'},
  {id:4,   img:'ori_img4',   name:'하루종일 잔잔한 음악',   tag:'음악방송',cat:'음악방송'},
  {id:5,   img:'ori_img5',   name:'가슴을 후벼파는 트로트', tag:'트로트',  cat:'트로트'},
  {id:7,   img:'ori_img7',   name:'클래식과 뉴에이지',      tag:'연주',    cat:'연주'},
  {id:208, img:'ori_img18',  name:'응답하라! 추억의 가요',  tag:'추억',    cat:'가요'},
  {id:9,   img:'ori_img13',  name:'7080 Pop 컬렉션',        tag:'POP',     cat:'POP'},
  {id:10,  img:'ori_img15',  name:'봄에 어울리는 음악',     tag:'음악방송',cat:'음악방송'},
  {id:11,  img:'ori_img14',  name:'영화 OST',               tag:'OST',     cat:'OST'},
  {id:12,  img:'ori_img17',  name:'드라마 OST',             tag:'OST',     cat:'OST'},
  {id:13,  img:'ori_img19',  name:'랩, 힙합',               tag:'힙합',    cat:'힙합'},
  {id:14,  img:'ori_img16',  name:'정통 재즈',              tag:'재즈',    cat:'재즈'},
  {id:206, img:'ori_img21',  name:'여름노래',               tag:'음악방송',cat:'음악방송'},
  {id:207, img:'ori_img22',  name:'가을 감성',              tag:'음악방송',cat:'음악방송'},
  {id:209, img:'ori_img23',  name:'겨울 포근한 음악',       tag:'음악방송',cat:'음악방송'},
  {id:211, img:'ori_img119', name:'산뜻한 연주',            tag:'연주',    cat:'연주'},
  {id:212, img:'ori_img120', name:'커피와 재즈',            tag:'재즈',    cat:'재즈'},
  {id:213, img:'ori_img121', name:'편안한 독서 & 집중',     tag:'음악방송',cat:'음악방송'},
  {id:214, img:'ori_img122', name:'이지리스닝 연주',        tag:'연주',    cat:'연주'},
  {id:215, img:'ori_img123', name:'힐링 피아노',            tag:'연주',    cat:'연주'},
  {id:216, img:'ori_img124', name:'아침 이지리스닝',        tag:'연주',    cat:'연주'},
  {id:217, img:'ori_img125', name:'재즈힙합 라운지',        tag:'재즈',    cat:'재즈'},
  {id:218, img:'ori_img126', name:'보사노바 & 라틴',        tag:'연주',    cat:'연주'},
];

const BASE_IMG='https://cdn.inlive.co.kr/inLive/image/instation/';
const audio=document.getElementById('audioEl');
let activeId=null,isMuted=false;
const isMobile=()=>window.innerWidth<=640;

/* ── 자동 채널 스킵 설정 ── */
const AUTO_SKIP_SEC=60;          // 재생 없을 시 다음 채널로 넘어가는 대기 시간 (초)
let autoSkipTimer=null;

/* ── ON AIR 상태 제어 ── */
function setOnAir(active){
  document.querySelectorAll('.on-air,.mob-on-air,.mp-on-air').forEach(el=>el.classList.toggle('active',active));
  document.querySelectorAll('.signal-bars').forEach(el=>el.classList.toggle('active',active));
  document.getElementById('tabPlayingDot').classList.toggle('visible',active);
}

/* ── 자동 채널 스킵 ── */
let isSkipping=false;
function startAutoSkipTimer(){
  clearAutoSkipTimer();
  autoSkipTimer=setTimeout(()=>{
    isSkipping=true;
    playNextChannel();
    // 새 채널에서도 playing 없으면 다시 타이머 걸어야 하므로
    // isSkipping은 playChannel 내 startAutoSkipTimer 호출 후 해제
  }, AUTO_SKIP_SEC*1000);
}
function clearAutoSkipTimer(){
  if(autoSkipTimer){clearTimeout(autoSkipTimer);autoSkipTimer=null}
}

/* ── 오디오 이벤트 바인딩 ── */
audio.addEventListener('playing',()=>{
  isSkipping=false;
  setOnAir(true);
  clearAutoSkipTimer();
});
audio.addEventListener('waiting',()=>{
  setOnAir(false);
});
audio.addEventListener('pause',()=>{
  setOnAir(false);
  clearAutoSkipTimer();
});
audio.addEventListener('error',()=>{
  setOnAir(false);
  if(!isSkipping) startAutoSkipTimer();  // 스킵 진행 중엔 무시
});
audio.addEventListener('stalled',()=>{
  setOnAir(false);
  if(!isSkipping) startAutoSkipTimer();  // 스킵 진행 중엔 무시
});

function getPort(id){return 10000+id*10}
function fakeFreq(id){
  const idx=channels.findIndex(c=>c.id===id);
  return (87.5+(108-87.5)/channels.length*idx).toFixed(1)+' FM';
}

/* ── 탭 전환 ── */
function switchTab(tab){
  const isPlayer=tab==='player';
  document.getElementById('tabChannels').classList.toggle('active',!isPlayer);
  document.getElementById('tabPlayer').classList.toggle('active',isPlayer);
  document.getElementById('mobileChannels').style.display=isPlayer?'none':'block';
  document.getElementById('mobilePlayer').classList.toggle('active',isPlayer);
}

/* ── 마퀴 ── */
function applyMarquee(mEl,iEl,tEl){
  mEl.classList.remove('scrolling','short');
  const clone=iEl.querySelector('.np-marquee-clone,.mp-marquee-clone');
  if(clone) clone.remove();
  requestAnimationFrame(()=>{
    const cW=mEl.offsetWidth, tW=tEl.offsetWidth;
    if(tW<=cW){mEl.classList.add('short');return}
    const gap=80;
    const cl=tEl.cloneNode(true);
    cl.classList.add('np-marquee-clone');
    cl.style.paddingLeft=gap+'px';
    iEl.appendChild(cl);
    const total=tW+gap, dur=total/60;
    iEl.style.setProperty('--marquee-dist',`-${total}px`);
    iEl.style.setProperty('--marquee-dur',`${dur}s`);
    mEl.classList.add('scrolling');
  });
}
function setMarqueeText(mId,iId,sId,text){
  const m=document.getElementById(mId),i=document.getElementById(iId),s=document.getElementById(sId);
  if(!m||!i||!s)return;
  s.textContent=text;
  applyMarquee(m,i,s);
}

/* ── Immersive BG 엔진 ── */
const FALLBACK_BG=[
  'linear-gradient(135deg,#1d1f27 0%,#0a0a0f 100%)',
  'linear-gradient(135deg,#241920 0%,#0a0a0f 100%)',
  'linear-gradient(135deg,#182127 0%,#0a0a0f 100%)',
  'linear-gradient(135deg,#211826 0%,#0a0a0f 100%)',
];
let activeBgSlot='a';
function getFallback(){return FALLBACK_BG[(activeId||0)%FALLBACK_BG.length]}

function setLayer(el, url) {
  if (url) {
    el.style.backgroundImage = `url("${url}")`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
  } else {
    el.style.backgroundImage = 'none';
    el.style.background = getFallback();
  }
}

function setImmersiveBg(imageUrl){
  const isA=activeBgSlot==='a';
  // 데스크탑 전체 배경
  const dA=document.getElementById('bgArtA'),dB=document.getElementById('bgArtB');
  // 데스크탑 플레이어
  const dpA=document.getElementById('dpBgA'),dpB=document.getElementById('dpBgB');
  // 모바일 플레이어
  const mpA=document.getElementById('mpBgA'),mpB=document.getElementById('mpBgB');

  const nextD=isA?dB:dA, currD=isA?dA:dB;
  const nextDp=isA?dpB:dpA, currDp=isA?dpA:dpB;
  const nextMp=isA?mpB:mpA, currMp=isA?mpA:mpB;

  [nextD,nextDp,nextMp].forEach(el=>setLayer(el,imageUrl));

  requestAnimationFrame(()=>{
    [nextD,nextDp,nextMp].forEach(el=>el.classList.add('active'));
    [currD,currDp,currMp].forEach(el=>el.classList.remove('active'));
  });
  activeBgSlot=isA?'b':'a';
}

/* ── 빌드 ── */
function buildTicker(){
  const frag=()=>{
    const f=document.createDocumentFragment();
    [...channels,...channels].forEach(c=>{
      const s=document.createElement('span');
      s.className='ticker-item';
      s.textContent=c.name;
      f.appendChild(s);
    });
    return f;
  };
  const t=document.getElementById('ticker'),mt=document.getElementById('mobTicker');
  if(t){t.innerHTML='';t.appendChild(frag())}
  if(mt){mt.innerHTML='';mt.appendChild(frag())}
}

function buildFilters(){
  const cats=['ALL',...new Set(channels.map(c=>c.cat))];
  ['filterSection','mobFilterSection'].forEach(id=>{
    const sec=document.getElementById(id);
    if(!sec)return;
    cats.forEach(cat=>{
      const btn=document.createElement('button');
      btn.className='filter-btn'+(cat==='ALL'?' active':'');
      btn.textContent=cat;
      btn.addEventListener('click',()=>applyFilter(cat));
      sec.appendChild(btn);
    });
  });
}

function applyFilter(cat){
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim()===cat);
  });
  document.querySelectorAll('.ch-card,.mob-ch-card').forEach(c=>{
    c.classList.toggle('hidden-card',cat!=='ALL'&&c.dataset.cat!==cat);
  });
  ['gridLabel','mobGridLabel'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent=cat==='ALL'?'ALL CHANNELS':cat.toUpperCase()+' CHANNELS';
  });
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function buildGrid(){
  const grid=document.getElementById('channelGrid');
  const mobGrid=document.getElementById('mobChannelGrid');

  channels.forEach((ch,i)=>{
    const imgSrc=`${BASE_IMG}${ch.img}.png`;
    const inner=`
      <div class="ch-top-line"></div>
      <img class="ch-thumb" src="${imgSrc}" alt="${esc(ch.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="ch-thumb-placeholder" style="display:none">🎵</div>
      <div class="ch-num">CH ${String(i+1).padStart(2,'0')}</div>
      <div class="ch-playing-badge"><svg viewBox="0 0 18 18" fill="#f5b740"><rect class="eq-bar" x="1" y="4" width="3" height="10" rx="1"/><rect class="eq-bar" x="7" y="2" width="3" height="14" rx="1"/><rect class="eq-bar" x="13" y="5" width="3" height="9" rx="1"/></svg></div>
      <div class="ch-info"><div class="ch-tag">${esc(ch.tag)}</div><div class="ch-name">${esc(ch.name)}</div></div>`;

    if(grid){
      const card=document.createElement('div');
      card.className='ch-card';card.dataset.id=ch.id;card.dataset.cat=ch.cat;
      card.innerHTML=inner;
      card.addEventListener('click',()=>playChannel(ch,card));
      grid.appendChild(card);
    }
    if(mobGrid){
      const mcard=document.createElement('div');
      mcard.className='ch-card mob-ch-card';mcard.dataset.id=ch.id;mcard.dataset.cat=ch.cat;
      mcard.innerHTML=inner;
      mcard.addEventListener('click',()=>{
        playChannel(ch,mcard);
        switchTab('player'); // 채널 선택 시 플레이어 탭으로
      });
      mobGrid.appendChild(mcard);
    }
  });
}

/* ── 플레이어 제어 ── */
function playPrevChannel() {
  if (!activeId) return;
  let idx = channels.findIndex(c => c.id === activeId);
  if (idx === -1) return;
  idx = (idx - 1 + channels.length) % channels.length;
  playChannel(channels[idx], null);
}

function playNextChannel() {
  if (!activeId) return;
  let idx = channels.findIndex(c => c.id === activeId);
  if (idx === -1) return;
  idx = (idx + 1) % channels.length;
  playChannel(channels[idx], null);
}

function playChannel(ch,card){
  if(activeId===ch.id){togglePlay();return}
  activeId=ch.id;
  document.querySelectorAll('.ch-card').forEach(c=>c.classList.remove('active'));
  // Activate all cards matching this channel (desktop + mobile)
  document.querySelectorAll(`.ch-card[data-id="${ch.id}"]`).forEach(c=>c.classList.add('active'));

  audio.src=`https://live01.inlive.co.kr/listen.html?port=${getPort(ch.id)}`;
  audio.play().catch(()=>{});

  const freq=fakeFreq(ch.id);

  // 데스크탑 업데이트
  document.getElementById('desktopPlayer').classList.add('visible');
  document.getElementById('dpTag').textContent=ch.name;
  document.getElementById('dpFreq').textContent=freq;
  setMarqueeText('dpTitleMarquee','dpTitleInner','dpTitle','–');
  setMarqueeText('dpArtistMarquee','dpArtistInner','dpArtist','');
  const dpAlbum=document.getElementById('dpAlbum');
  dpAlbum.innerHTML='<div class="album-placeholder">🎵</div>';
  dpAlbum.classList.remove('has-art');

  // 모바일 플레이어 업데이트
  document.getElementById('mpTag').textContent=ch.name;
  document.getElementById('mpFreq').textContent=freq;
  setMarqueeText('mpTitleMarquee','mpTitleInner','mpTitle','–');
  setMarqueeText('mpArtistMarquee','mpArtistInner','mpArtist','');
  const mpAlbum=document.getElementById('mpAlbum');
  mpAlbum.innerHTML='<div class="album-placeholder">🎵</div>';
  mpAlbum.classList.remove('has-art');

  setPlayIcon(true);
  setOnAir(false);
  isSkipping=false;          // 새 채널 진입 — 이벤트 감지 재개 (타이머 세팅 전에 초기화)
  startAutoSkipTimer();      // 60초 내 playing 없으면 다음 채널
  setImmersiveBg(null);
  startNowPlaying();
}

function togglePlay(){
  if(!activeId)return;
  if(audio.paused){
    audio.play().catch(()=>{});
    setPlayIcon(true);
    startNowPlaying();
    startAutoSkipTimer();  // 재생 재개 시에만 타이머 시작
  }else{
    audio.pause();
    setPlayIcon(false);
    stopNowPlaying();      // 내부에서 clearAutoSkipTimer() 호출
  }
}

/* ── 플레이어 제어 아이콘 동기화 수정 ── */
function setPlayIcon(playing){
  // 일시정지 상태일 때 보여줄 '일시정지 아이콘(▮▮)'
  const pauseSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  // 재생 중이 아닐 때 보여줄 '재생 아이콘(▶)'
  const playSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';

  const dtBtn = document.getElementById('dpPlayBtn'); // 데스크탑 버튼
  const mbBtn = document.getElementById('mpPlayBtn'); // 모바일 버튼

  if (dtBtn) dtBtn.innerHTML = playing ? pauseSvg : playSvg;
  if (mbBtn) mbBtn.innerHTML = playing ? pauseSvg : playSvg;
}

function setVolume(val){
  audio.volume=parseFloat(val);isMuted=false;audio.muted=false;
  ['dpVolIcon','mpVolIcon'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='🔊'});
  const ms=document.getElementById('mpVolSlider');if(ms)ms.value=val;
  const vs=document.getElementById('volSlider');if(vs)vs.value=val;
}

/* ── 볼륨 컨트롤 마우스 휠 스크롤 ── */
(function(){
  function onVolWheel(e){
    e.preventDefault();
    const step=0.05;
    const delta=e.deltaY<0?step:-step;
    const newVol=Math.min(1,Math.max(0,audio.volume+delta));
    setVolume(newVol.toFixed(2));
    if(newVol===0){isMuted=true;audio.muted=true;['dpVolIcon','mpVolIcon'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='🔇'});}
  }
  /* 데스크탑 볼륨 영역 */
  ['volSlider','dpVolIcon'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('wheel',onVolWheel,{passive:false});
  });
  /* vol-wrap 전체에도 적용 */
  document.querySelectorAll('.vol-wrap').forEach(el=>el.addEventListener('wheel',onVolWheel,{passive:false}));
  /* 모바일 볼륨 영역 */
  ['mpVolSlider','mpVolIcon'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('wheel',onVolWheel,{passive:false});
  });
  document.querySelectorAll('.mp-vol').forEach(el=>el.addEventListener('wheel',onVolWheel,{passive:false}));
})();
function toggleMute(){
  isMuted=!isMuted;audio.muted=isMuted;
  const ico=isMuted?'🔇':'🔊';
  ['dpVolIcon','mpVolIcon'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=ico});
}

audio.volume=1.0;
buildTicker();buildFilters();buildGrid();

/* ── NOW PLAYING ── */
let npTimer=null,lastTrackStr='',currentArtUrl=null;

async function fetchStatsMeta(port){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch(`https://live01.inlive.co.kr/stats.html?port=${port}`,
      {cache:'no-store',headers:{'Accept':'text/html,application/json,*/*'},signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok)return null;
    const ct=res.headers.get('content-type')||'';
    if(ct.includes('json')){
      const d=await res.json();
      const title=d.title||d.currenttitle||d.current_song||d.songtitle||'';
      const artist=d.artist||d.currentartist||'';
      if(title||artist)return parseArtistTitle(artist,title);
      return null;
    }
    return parseStatsHtml(await res.text());
  }catch(e){console.debug('[NP]',e.message);return null}
}
function parseStatsHtml(html){
  const plain=html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  const parts=plain.split(',');
  if(parts.length>=6)return parseArtistTitle('',parts.slice(5).join(',').trim());
  if(plain.length>1&&plain.length<300)return parseArtistTitle('',plain);
  return null;
}
function parseArtistTitle(artist,raw){
  raw=(raw||'').trim();
  if(!raw&&!artist)return null;
  if(!artist&&raw.includes(' - ')){
    const idx=raw.indexOf(' - ');
    return{artist:raw.slice(0,idx).trim(),title:raw.slice(idx+3).trim()};
  }
  return{artist:(artist||'').trim(),title:raw};
}
async function fetchStatsMetaViaProxy(port){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://live01.inlive.co.kr/stats.html?port=${port}`)}`,{cache:'no-store',signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok)return null;
    const d=await res.json();
    return d.contents?parseStatsHtml(d.contents):null;
  }catch(e){return null}
}
async function fetchAlbumArt(artist,title){
  try{
    const q=encodeURIComponent((artist?`${artist} `:'')+title);
    const res=await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=3`,{cache:'default'});
    if(!res.ok)return null;
    const d=await res.json();
    if(!d.results?.length)return null;
    return d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
  }catch(e){return null}
}

let _artLoadImgs=[];
function updateNowPlayingUI(artist,title,artUrl,loading=false){
  const dpAlbum=document.getElementById('dpAlbum');
  const mpAlbum=document.getElementById('mpAlbum');

  if(loading){
    const loadHtml='<div class="album-placeholder"><span class="np-spin">⟳</span></div>';
    dpAlbum.innerHTML=loadHtml;mpAlbum.innerHTML=loadHtml;
    dpAlbum.classList.remove('has-art');mpAlbum.classList.remove('has-art');
    setMarqueeText('dpTitleMarquee','dpTitleInner','dpTitle','불러오는 중...');
    setMarqueeText('dpArtistMarquee','dpArtistInner','dpArtist','');
    setMarqueeText('mpTitleMarquee','mpTitleInner','mpTitle','불러오는 중...');
    setMarqueeText('mpArtistMarquee','mpArtistInner','mpArtist','');
    return;
  }

  setMarqueeText('dpTitleMarquee','dpTitleInner','dpTitle',title||'–');
  setMarqueeText('dpArtistMarquee','dpArtistInner','dpArtist',artist||'');
  setMarqueeText('mpTitleMarquee','mpTitleInner','mpTitle',title||'–');
  setMarqueeText('mpArtistMarquee','mpArtistInner','mpArtist',artist||'');

  if(artUrl!==undefined){
    // abort any in-flight image loads
    _artLoadImgs.forEach(img=>{img.onload=null;img.onerror=null;img.src=''});
    _artLoadImgs=[];
    if(artUrl){
      [dpAlbum,mpAlbum].forEach(albumEl=>{
        const img=new Image();
        _artLoadImgs.push(img);
        img.alt=title||'';
        img.style.cssText='width:100%;height:100%;object-fit:cover;display:block';
        img.onload=()=>{albumEl.innerHTML='';albumEl.appendChild(img);albumEl.classList.add('has-art')};
        img.onerror=()=>{albumEl.innerHTML='<div class="album-placeholder">🎵</div>';albumEl.classList.remove('has-art')};
        img.src=artUrl;
      });
      setImmersiveBg(artUrl);
      currentArtUrl=artUrl;
    }else{
      const ph='<div class="album-placeholder">🎵</div>';
      dpAlbum.innerHTML=ph;mpAlbum.innerHTML=ph;
      dpAlbum.classList.remove('has-art');mpAlbum.classList.remove('has-art');
      setImmersiveBg(null);currentArtUrl=null;
    }
  }
}

async function pollNowPlaying(){
  if(!activeId)return;
  const port=getPort(activeId);
  let meta=await fetchStatsMeta(port);
  if(!meta)meta=await fetchStatsMetaViaProxy(port);
  if(!meta)return;
  const trackStr=`${meta.artist}||${meta.title}`;
  if(trackStr===lastTrackStr)return;
  lastTrackStr=trackStr;
  updateNowPlayingUI(meta.artist,meta.title,undefined);
  const art=await fetchAlbumArt(meta.artist,meta.title);
  if(lastTrackStr===`${meta.artist}||${meta.title}`)
    updateNowPlayingUI(meta.artist,meta.title,art||null);
}
function startNowPlaying(){
  lastTrackStr='';currentArtUrl=null;
  if(npTimer)clearInterval(npTimer);
  updateNowPlayingUI('','','',true);
  pollNowPlaying();
  npTimer=setInterval(pollNowPlaying,12000);
}
function stopNowPlaying(){
  if(npTimer){clearInterval(npTimer);npTimer=null}
  clearAutoSkipTimer();
  setOnAir(false);
  const ph='<div class="album-placeholder">🎵</div>';
  ['dpAlbum','mpAlbum'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.innerHTML=ph;el.classList.remove('has-art')}
  });
  setMarqueeText('dpTitleMarquee','dpTitleInner','dpTitle','–');
  setMarqueeText('dpArtistMarquee','dpArtistInner','dpArtist','');
  setMarqueeText('mpTitleMarquee','mpTitleInner','mpTitle','–');
  setMarqueeText('mpArtistMarquee','mpArtistInner','mpArtist','');
  setImmersiveBg(null);
  lastTrackStr='';currentArtUrl=null;
}

/* 데스크탑 플레이어 높이에 맞춰 padding 조정 */
function adjustBodyPadding(){
  const bar=document.getElementById('desktopPlayer');
  if(bar&&bar.classList.contains('visible'))
    document.getElementById('desktopView').style.paddingBottom=(bar.offsetHeight+20)+'px';
}
const _dpBar=document.getElementById('desktopPlayer');
if(_dpBar){
  new ResizeObserver(adjustBodyPadding).observe(_dpBar);
}
window.addEventListener('resize',adjustBodyPadding);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
  });
}
