name: Update Channels

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다 자동 실행
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Run get_radio.sh and export JSON
        run: |
          chmod +x get_radio.sh
          bash get_radio_json.sh > channels.json
          echo "Generated channels.json:"
          cat channels.json | jq '.channels | length'

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git diff --cached --quiet || git commit -m "chore: update channels $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
