<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INS-PLAY Music Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f0f11;
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 상단 네비게이션 및 검색 */
        header {
            background-color: #18181b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #27272a;
            gap: 20px;
        }

        .header-logo-zone {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            color: #3b82f6; /* 부드러운 블루 포인트 */
            letter-spacing: -0.5px;
        }

        .update-time {
            font-size: 11px;
            color: #71717a;
            margin-top: 2px;
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            background-color: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 20px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #3b82f6;
            background-color: #18181b;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .counter-badge {
            background-color: #27272a;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: #a1a1aa;
            font-weight: 600;
        }

        /* 메인 콘텐츠 영역 (스크롤) */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 채널 카드 디자인 */
        .channel-card {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .channel-card:hover {
            background-color: #242427;
            border-color: #3f3f46;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .channel-card.active {
            background-color: #1e293b;
            border-color: #3b82f6;
        }

        .thumb-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            background-color: #27272a;
            margin-bottom: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .channel-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .channel-card:hover .channel-thumb {
            transform: scale(1.05);
        }

        .fallback-thumb {
            font-size: 42px;
            color: #52525b;
        }

        .channel-name {
            font-size: 15px;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 42px; /* 2줄 확보 고정 */
            margin-bottom: 4px;
        }

        .channel-id {
            font-size: 12px;
            color: #71717a;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* 하단 컨트롤러 바 */
        footer {
            background-color: #111113;
            border-top: 1px solid #27272a;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            z-index: 10;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 30%;
            min-width: 240px;
        }

        .player-thumb {
            width: 52px;
            height: 52px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #27272a;
            border: 1px solid #3f3f46;
        }

        .player-text {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-status {
            font-size: 12px;
            color: #9a9a9a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #52525b;
            display: inline-block;
        }

        .status-dot.playing {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .player-controls {
            width: 40%;
            max-width: 600px;
            display: flex;
            justify-content: center;
        }

        audio {
            width: 100%;
            height: 36px;
        }

        .right-spacer {
            width: 30%;
            min-width: 240px;
        }

        .loading-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: #a1a1aa;
            font-size: 15px;
        }

        /* 모바일 최적화 레이아웃 */
        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
                flex-wrap: wrap;
            }
            .search-container {
                order: 3;
                max-width: 100%;
                width: 100%;
                margin-top: 4px;
            }
            footer {
                flex-direction: column;
                padding: 16px;
                gap: 14px;
            }
            .player-info {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
            .player-controls {
                width: 100%;
            }
            .right-spacer {
                display: none;
            }
            main {
                padding: 16px;
            }
            .channel-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .channel-name {
                font-size: 13px;
                height: 36px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo-zone">
            <div class="header-title">INS-PLAY</div>
            <div class="update-time" id="updateTime">업데이트: --</div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="채널 이름으로 검색...">
        </div>
        <div class="counter-badge" id="channelCounter">Channels: 0</div>
    </header>

    <main>
        <div class="channel-grid" id="channelGrid">
            <div class="loading-box">스트리밍 채널 데이터를 가져오는 중입니다...</div>
        </div>
    </main>

    <footer>
        <div class="player-info">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='52' height='52'><rect width='52' height='52' fill='%2327272a'/></svg>" id="playerThumb" class="player-thumb" alt="정지">
            <div class="player-text">
                <div class="player-title" id="playerTitle">선택된 채널 없음</div>
                <div class="player-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">대기 중</span>
                </div>
            </div>
        </div>

        <div class="player-controls">
            <audio id="audioPlayer" controls autoplay></audio>
        </div>
        
        <div class="right-spacer"></div>
    </footer>

    <script>
        // 제공해주신 원본 GitHub JSON URL
        const jsonUrl = 'https://raw.githubusercontent.com/hckwon767/ins-play/refs/heads/main/channels.json';
        
        let allChannels = [];

        const channelGrid = document.getElementById('channelGrid');
        const searchInput = document.getElementById('searchInput');
        const updateTimeEl = document.getElementById('updateTime');
        const counterBadge = document.getElementById('channelCounter');
        
        const audioPlayer = document.getElementById('audioPlayer');
        const playerThumb = document.getElementById('playerThumb');
        const playerTitle = document.getElementById('playerTitle');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // 기본 무지개 투명 이미지 픽셀 (에러 방지용 기본 커버)
        const defaultImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2327272a'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='%2371717a' font-size='28'>📻</text></svg>";

        // 1. JSON 리포지토리에서 가져오기
        async function fetchChannels() {
            try {
                let response = await fetch(jsonUrl);
                
                // 만약 CORS 문제 등으로 외부 fetch가 제한될 경우 로컬 파일을 예비로 호출
                if (!response.ok) {
                    response = await fetch('channels.json');
                }
                
                const data = await response.json();
                
                // 상단 메타데이터 파싱
                if(data.updatedAt) updateTimeEl.innerText = `업데이트: ${data.updatedAt}`;
                if(data.channels) {
                    allChannels = data.channels;
                } else if(Array.isArray(data)) {
                    allChannels = data;
                }
                
                counterBadge.innerText = `Channels: ${allChannels.length}`;
                renderGrid(allChannels);

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                channelGrid.innerHTML = `
                    <div class="loading-box" style="color: #ef4444;">
                        채널 로드에 실패했습니다. <br>
                        <span style="font-size:12px; color:#a1a1aa; display:block; margin-top:8px;">
                            보안 정책(CORS) 제한이 감지되면 이 html 파일과 같은 자리에 복사한 channels.json을 배치해 수동 구동해 주세요.
                        </span>
                    </div>`;
            }
        }

        // 2. 그리드 아이템 생성 렌더링
        function renderGrid(channels) {
            channelGrid.innerHTML = '';
            if(channels.length === 0) {
                channelGrid.innerHTML = '<div class="loading-box">검색된 채널이 없습니다.</div>';
                return;
            }

            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                
                // HTML Entities (&amp; 등) 디코딩을 위한 안전한 처리
                const txtNode = document.createElement('textarea');
                txtNode.innerHTML = ch.name;
                const cleanName = txtNode.value;

                // 썸네일 체크
                const thumbSrc = ch.thumbUrl ? ch.thumbUrl : defaultImg;

                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="${thumbSrc}" class="channel-thumb" alt="cover" onerror="this.src='${defaultImg}'">
                    </div>
                    <div class="channel-name" title="${cleanName}">${cleanName}</div>
                    <div class="channel-id">${ch.bsid}</div>
                `;

                card.addEventListener('click', () => {
                    selectAndPlay(ch.streamUrl, cleanName, thumbSrc, card);
                });

                channelGrid.appendChild(card);
            });
        }

        // 3. 오디오 재생 엔진 연동
        function selectAndPlay(streamUrl, name, thumb, cardElement) {
            // 액티브 클래스 순환 전환
            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
            if(cardElement) cardElement.classList.add('active');

            // 소스 주입 및 하단 오디오 로딩 시작
            audioPlayer.src = streamUrl;
            playerTitle.innerText = name;
            playerThumb.src = thumb;
            
            audioPlayer.play()
                .catch(err => {
                    console.log("Playback interrupted/error:", err);
                    statusText.innerText = "연결 실패 (오프라인 주소)";
                    statusDot.className = "status-dot";
                    statusDot.style.backgroundColor = "#ef4444";
                });
        }

        // 4. 실시간 타이핑 서치 필터
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = allChannels.filter(ch => {
                return ch.name.toLowerCase().includes(val) || ch.bsid.toLowerCase().includes(val);
            });
            renderGrid(filtered);
        });

        /* 오디오 이벤트를 감지해 우측 하단 상태 점등 제어 */
        audioPlayer.addEventListener('loadstart', () => {
            statusText.innerText = "버퍼링/연결 중...";
            statusDot.className = "status-dot";
            statusDot.style.backgroundColor = "#eab308";
        });

        audioPlayer.addEventListener('playing', () => {
            statusText.innerText = "방송 재생 중";
            statusDot.className = "status-dot playing";
            statusDot.style.backgroundColor = ""; // CSS 클래스 내부 컬러 지정
        });

        audioPlayer.addEventListener('pause', () => {
            statusText.innerText = "일시 정지";
            statusDot.className = "status-dot";
            statusDot.style.backgroundColor = "#52525b";
        });

        audioPlayer.addEventListener('error', () => {
            statusText.innerText = "주소 에러 (스트림 중단)";
            statusDot.className = "status-dot";
            statusDot.style.backgroundColor = "#ef4444";
        });

        // 돔 트리 빌드 후 즉시 작동
        window.addEventListener('DOMContentLoaded', fetchChannels);
    </script>
</body>
</html>
